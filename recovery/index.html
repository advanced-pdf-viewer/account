<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Password recovery</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
  </head>

  <body>
    <div id="status">Processing...</div>

<input id="password" type="password" placeholder="New password">
<button onclick="reset()">Set new password</button>
<script type="module">
  import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm"
  const supabase = createClient("https://nbosurryjbwvaegjhilr.supabase.co", "sb_publishable_kLxoxQMgbCLAMyurU9pqzw_qdQg8JJ4")

  async function reset() {
    const password = document.getElementById("password").value
    const { error } = await supabase.auth.updateUser({ password })
    if (error) {
      alert(error.message)
    } else {
      alert("Password updated! Return to the application.")
    }
  }
  window.reset = reset
</script>
  </body>
</html>
